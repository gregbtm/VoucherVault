{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="pagetitle">
  <h1>{{ title }}</h1>
  <nav>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'show_items' %}">{% trans "Home" %}</a></li>
      <li class="breadcrumb-item"><a href="{% url 'help_center' %}">{% trans "Help &amp; Guides" %}</a></li>
      <li class="breadcrumb-item active">{{ title }}</li>
    </ol>
  </nav>
</div><!-- End Page Title -->

<section class="section">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body doc-viewer-body">
          {{ body_html|safe }}
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
