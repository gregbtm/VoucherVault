{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="pagetitle">
  <h1>{{ title }}</h1>
  <nav>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'show_items' %}">{% trans "Home" %}</a></li>
      <li class="breadcrumb-item"><a href="{% url 'site_settings' %}">{% trans "Site Settings" %}</a></li>
      <li class="breadcrumb-item active">{{ title }}</li>
    </ol>
  </nav>
</div><!-- End Page Title -->

<section class="section">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body doc-viewer-body">
          {{ body_html|safe }}
        </div>
      </div>
    </div>
  </div>
</section>

<style>
  .doc-viewer-body { max-width: 860px; line-height: 1.6; }
  .doc-viewer-body h1 { font-size: 1.6rem; margin-top: 0; }
  .doc-viewer-body h2 { font-size: 1.3rem; margin-top: 1.75rem; }
  .doc-viewer-body h3 { font-size: 1.1rem; margin-top: 1.5rem; }
  .doc-viewer-body pre {
    background: var(--bs-tertiary-bg, #f3f3f3);
    border: 1px solid var(--border-color, #dee2e6);
    border-radius: 8px;
    padding: 0.9rem;
    overflow-x: auto;
  }
  .doc-viewer-body code {
    background: var(--bs-tertiary-bg, #f3f3f3);
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
    font-size: 0.9em;
  }
  .doc-viewer-body pre code { background: transparent; padding: 0; }
  .doc-viewer-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    display: block;
    overflow-x: auto;
  }
  .doc-viewer-body th, .doc-viewer-body td {
    border: 1px solid var(--border-color, #dee2e6);
    padding: 0.5rem 0.75rem;
    text-align: left;
  }
  .doc-viewer-body blockquote {
    border-left: 3px solid var(--primary-color, #4154f1);
    margin-left: 0;
    padding-left: 1rem;
    color: var(--text-muted, #6c757d);
  }
  body.dark-mode .doc-viewer-body pre,
  body.dark-mode .doc-viewer-body code {
    background: #2a2b2f;
    border-color: #3a3b40;
  }
</style>
{% endblock content %}
