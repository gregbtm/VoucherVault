services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vouchervault-fork:latest
    container_name: vouchervault
    restart: unless-stopped
    environment:
      # set to true to enable debug mode
      - DEBUG=${DEBUG:-False}
      # your FQDN or IP; multiple ones supported by comma separation
      - DOMAIN=${DOMAIN:-vouchervault.example.com}
      # set to True if you use a reverse proxy with tls; enables secure cookie flag and hsts
      - SECURE_COOKIES=${SECURE_COOKIES:-False}
      # define the maximum session age in minutes
      - SESSION_COOKIE_AGE=${SESSION_COOKIE_AGE:-30}
      # decide whether session cookie is invalidated on browser close
      - SESSION_EXPIRE_AT_BROWSER_CLOSE=${SESSION_EXPIRE_AT_BROWSER_CLOSE:-True}
      # send expiry notification xx days prior expiry
      - EXPIRY_THRESHOLD_DAYS=${EXPIRY_THRESHOLD_DAYS:-90}
      # send a final expiry notification xx days prior expiry
      - EXPIRY_LAST_NOTIFICATION_DAYS=${EXPIRY_LAST_NOTIFICATION_DAYS:-7}
      # define the timezone
      - TZ=${TZ:-Europe/Berlin}
      # default ntfy server pre-filled for new ntfy notification rules
      - NTFY_DEFAULT_SERVER=${NTFY_DEFAULT_SERVER:-https://ntfy.sh}
      # set both to enable the Web Push notification backend; generate with:
      #   docker compose exec app python manage.py generate_vapid_keys
      - WEBPUSH_VAPID_PUBLIC_KEY=${WEBPUSH_VAPID_PUBLIC_KEY:-}
      - WEBPUSH_VAPID_PRIVATE_KEY=${WEBPUSH_VAPID_PRIVATE_KEY:-}
      - WEBPUSH_VAPID_CLAIMS_EMAIL=${WEBPUSH_VAPID_CLAIMS_EMAIL:-mailto:admin@example.com}
      # set to False to disable auto-fetching merchant logos
      - MERCHANT_LOGOS_ENABLED=${MERCHANT_LOGOS_ENABLED:-True}
      # set to "claude" or "tesseract" to enable the "Scan with AI" button
      - OCR_BACKEND=${OCR_BACKEND:-none}
      # required if OCR_BACKEND=claude
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # optional; overrides the Claude model used for OCR extraction
      - ANTHROPIC_OCR_MODEL=${ANTHROPIC_OCR_MODEL:-claude-sonnet-5}
      # define custom frame-ancestor csp directive
      #- CSP_FRAME_ANCESTORS=${CSP_FRAME_ANCESTORS:?Set CSP_FRAME_ANCESTORS in .env}
      #- SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      #- PORT=${PORT:-8000}
      #- REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # ------- OPTIONAL OIDC AUTH --------
      # Set to 'True' to enable OIDC authentication
      #- OIDC_ENABLED=${OIDC_ENABLED:-False}
      # Decide whether login area triggers automatic OIDC login flow
      #- OIDC_AUTOLOGIN=${OIDC_AUTOLOGIN:-False}
      # Set to 'True' to allow the creation of new users through OIDC
      #- OIDC_CREATE_USER=${OIDC_CREATE_USER:-False}
      # The signing algorithm used by the OIDC provider (e.g., RS256, HS256)
      #- OIDC_RP_SIGN_ALGO=${OIDC_RP_SIGN_ALGO:-RS256}
      # URL of the JWKS endpoint for the OIDC provider
      #- OIDC_OP_JWKS_ENDPOINT=${OIDC_OP_JWKS_ENDPOINT:?Set OIDC_OP_JWKS_ENDPOINT in .env}
      # Client ID for your OIDC RP
      #- OIDC_RP_CLIENT_ID=${OIDC_RP_CLIENT_ID:-vouchervault}
      # Client secret for your OIDC RP
      #- OIDC_RP_CLIENT_SECRET=${OIDC_RP_CLIENT_SECRET:?Set OIDC_RP_CLIENT_SECRET in .env}
      # Authorization endpoint URL of the OIDC provider
      #- OIDC_OP_AUTHORIZATION_ENDPOINT=${OIDC_OP_AUTHORIZATION_ENDPOINT:?Set OIDC_OP_AUTHORIZATION_ENDPOINT in .env}
      # Token endpoint URL of the OIDC provider
      #- OIDC_OP_TOKEN_ENDPOINT=${OIDC_OP_TOKEN_ENDPOINT:?Set OIDC_OP_TOKEN_ENDPOINT in .env}
      # User info endpoint URL of the OIDC provider
      #- OIDC_OP_USER_ENDPOINT=${OIDC_OP_USER_ENDPOINT:?Set OIDC_OP_USER_ENDPOINT in .env}
      # ------- OPTIONAL PSQL DB --------
      #- DB_ENGINE=${DB_ENGINE:-postgres}
      #- POSTGRES_USER=${POSTGRES_USER:-vouchervault}
      #- POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      #- POSTGRES_DB=${POSTGRES_DB:-vouchervault}
      #- POSTGRES_HOST=${POSTGRES_HOST:-db}
      #- POSTGRES_PORT=${POSTGRES_PORT:-5432}
      # ------- CELERY ENVS --------
      #- CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-4}
      #- CELERY_WORKER_PREFETCH_MULTIPLIER=${CELERY_WORKER_PREFETCH_MULTIPLIER:-2}
      # ------- OPTIONAL APPLE WALLET EXPORT --------
      # set all of these (and mount the cert files below) to enable .pkpass export
      - PKPASS_CERT_PATH=${PKPASS_CERT_PATH:-}
      - PKPASS_CERT_PASSWORD=${PKPASS_CERT_PASSWORD:-}
      - PKPASS_WWDR_CERT_PATH=${PKPASS_WWDR_CERT_PATH:-}
      - PKPASS_TEAM_ID=${PKPASS_TEAM_ID:-}
      - PKPASS_PASS_TYPE_ID=${PKPASS_PASS_TYPE_ID:-}
      - PKPASS_ORGANIZATION_NAME=${PKPASS_ORGANIZATION_NAME:-VoucherVault Plus+}
      # ------- OPTIONAL GOOGLE WALLET EXPORT --------
      # set both of these (and mount the service account key below) to enable Google Wallet export
      - GOOGLE_WALLET_SERVICE_ACCOUNT_KEY_PATH=${GOOGLE_WALLET_SERVICE_ACCOUNT_KEY_PATH:-}
      - GOOGLE_WALLET_ISSUER_ID=${GOOGLE_WALLET_ISSUER_ID:-}
      - GOOGLE_WALLET_CLASS_ID=${GOOGLE_WALLET_CLASS_ID:-}
      # set to False to disable the periodic GitHub Releases update check
      - UPDATE_CHECK_ENABLED=${UPDATE_CHECK_ENABLED:-True}
    expose:
      - 8000
    ports:
      - 8000:8000
    volumes:
      - ./volume-data/database:/opt/app/database
      # mount your Apple Wallet certs here if PKPASS_CERT_PATH is set above
      #- ./volume-data/pkpass:/opt/app/pkpass:ro
      # mount your Google Wallet service account key here if GOOGLE_WALLET_SERVICE_ACCOUNT_KEY_PATH is set above
      #- ./volume-data/google-wallet:/opt/app/google-wallet:ro
    #networks:
    #  - proxy
    #labels:
    #  - traefik.enable=true
    #  - traefik.docker.network=proxy
    #  - traefik.http.routers.vouchervault.rule=Host(`vouchervault.example.com`)
    #  - traefik.http.services.vouchervault.loadbalancer.server.port=8000
    #  # Optional part for traefik middlewares
    #  - traefik.http.routers.vouchervault.middlewares=local-ipwhitelist@file

  redis:
    container_name: vouchervault-redis
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - 6379
    #networks:
    #  - proxy

