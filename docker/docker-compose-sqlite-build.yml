services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vouchervault-fork:latest
    container_name: vouchervault
    restart: unless-stopped
    environment:
      # your FQDN or IP; multiple ones supported by comma separation
      - DOMAIN=${DOMAIN:-vouchervault.example.com}
      # set to True if you use a reverse proxy with tls; enables secure cookie flag and hsts
      - SECURE_COOKIES=${SECURE_COOKIES:-False}
      # send notifications xx days prior expiry
      - EXPIRY_THRESHOLD_DAYS=${EXPIRY_THRESHOLD_DAYS:-90}
      # define the timezone
      - TZ=${TZ:-Europe/Berlin}
      # default ntfy server pre-filled for new ntfy notification rules
      - NTFY_DEFAULT_SERVER=${NTFY_DEFAULT_SERVER:-https://ntfy.sh}
      # set both to enable the Web Push notification backend; generate with:
      #   docker compose exec app python manage.py generate_vapid_keys
      #- WEBPUSH_VAPID_PUBLIC_KEY=${WEBPUSH_VAPID_PUBLIC_KEY}
      #- WEBPUSH_VAPID_PRIVATE_KEY=${WEBPUSH_VAPID_PRIVATE_KEY}
      # set to False to disable auto-fetching merchant logos
      - MERCHANT_LOGOS_ENABLED=${MERCHANT_LOGOS_ENABLED:-True}
      # set to "claude" or "tesseract" to enable the "Scan with AI" button
      - OCR_BACKEND=${OCR_BACKEND:-none}
      # required if OCR_BACKEND=claude
      #- ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      # ------- OPTIONAL APPLE WALLET EXPORT --------
      # set all of these (and mount the cert files below) to enable .pkpass export
      #- PKPASS_CERT_PATH=/opt/app/pkpass/pass-cert.p12
      #- PKPASS_CERT_PASSWORD=${PKPASS_CERT_PASSWORD}
      #- PKPASS_WWDR_CERT_PATH=/opt/app/pkpass/AppleWWDRCAG4.pem
      #- PKPASS_TEAM_ID=${PKPASS_TEAM_ID}
      #- PKPASS_PASS_TYPE_ID=${PKPASS_PASS_TYPE_ID}
      #- PKPASS_ORGANIZATION_NAME=${PKPASS_ORGANIZATION_NAME:-VoucherVault}
    expose:
      - 8000
    ports:
      - 8000:8000
    volumes:
      - ./volume-data/database:/opt/app/database
      # mount your Apple Wallet certs here if PKPASS_CERT_PATH is set above
      #- ./volume-data/pkpass:/opt/app/pkpass:ro

  redis:
    image: redis:7-alpine
    container_name: vouchervault-redis
    restart: unless-stopped
    expose:
      - 6379
