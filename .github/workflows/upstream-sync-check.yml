name: Upstream Sync Check

# Read-only visibility into whether l4rm4nd/VoucherVault (upstream) has
# moved since this fork's UPSTREAM_VERSION file was last bumped - see
# docs/UPSTREAM_SYNC.md. Never merges anything itself; only opens/updates
# a single pinned tracking issue so it's visible even without a Claude
# session running. The actual sync work is a separate, human-and-Claude
# reviewed process.

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday at 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/l4rm4nd/VoucherVault.git
          # actions/checkout already pulled this fork's own v1.1.x tags into
          # refs/tags/*. Upstream has its OWN unrelated v1.1.x tags from long
          # before this fork existed (upstream's version history goes back
          # to v0.1.0, independent of this fork's numbering) - fetching
          # those into the same refs/tags/* namespace collides ("would
          # clobber existing tag") and fails the whole fetch. Map upstream's
          # tags into a separate namespace instead.
          git fetch upstream main
          git fetch upstream 'refs/tags/*:refs/upstream-tags/*'

      - name: Compare against last-synced version
        id: compare
        run: |
          LAST_SYNCED=$(tr -d '[:space:]' < UPSTREAM_VERSION)
          LAST_SYNCED_REF="refs/upstream-tags/v${LAST_SYNCED}"

          if ! git rev-parse "$LAST_SYNCED_REF" >/dev/null 2>&1; then
            echo "Warning: tag v${LAST_SYNCED} not found upstream - can't compute an exact commit range."
            echo "has_new=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_COUNT=$(git rev-list --count "${LAST_SYNCED_REF}..upstream/main")
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$COMMIT_COUNT" -gt 0 ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            {
              echo 'commit_list<<EOF'
              git log "${LAST_SYNCED_REF}..upstream/main" --pretty='- `%h` %s'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update tracking issue
        if: steps.compare.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_COUNT: ${{ steps.compare.outputs.commit_count }}
          COMMIT_LIST: ${{ steps.compare.outputs.commit_list }}
        # Uses `gh api` (REST) rather than `gh issue` (GraphQL) - the
        # auto-generated GITHUB_TOKEN has repeatedly hit "Resource not
        # accessible by integration (createIssue)" on the GraphQL mutation
        # even with issues: write granted and Issues enabled on the repo.
        # REST's POST/PATCH /issues works with the exact same token/scope.
        run: |
          TITLE="Upstream sync available - ${COMMIT_COUNT} new commit(s)"
          BODY=$(cat <<EOF
          l4rm4nd/VoucherVault (upstream) has ${COMMIT_COUNT} commit(s) not yet
          in this fork's \`UPSTREAM_VERSION\`:

          ${COMMIT_LIST}

          See [docs/UPSTREAM_SYNC.md](../blob/main/docs/UPSTREAM_SYNC.md) for
          how a sync is reviewed and merged. This issue is auto-updated
          weekly and closes itself once a sync lands.
          EOF
          )

          EXISTING=$(gh api "repos/${{ github.repository }}/issues?state=open&per_page=100" --jq '[.[] | select(.title | startswith("Upstream sync available"))][0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/issues/${EXISTING}" -X PATCH -f title="$TITLE" -f body="$BODY"
          else
            gh api "repos/${{ github.repository }}/issues" -X POST -f title="$TITLE" -f body="$BODY"
          fi

      - name: Close tracking issue if fully synced
        if: steps.compare.outputs.has_new == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh api "repos/${{ github.repository }}/issues?state=open&per_page=100" --jq '[.[] | select(.title | startswith("Upstream sync available"))][0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/issues/${EXISTING}/comments" -X POST -f body="Fully synced with upstream as of this check."
            gh api "repos/${{ github.repository }}/issues/${EXISTING}" -X PATCH -f state=closed -f state_reason=not_planned
          fi
