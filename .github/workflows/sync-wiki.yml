name: Sync Wiki

# The wiki lives in a separate git repo (owner/repo.wiki.git) that a plain
# GITHUB_TOKEN can't push to. wiki/ in this repo is the source of truth -
# edit it here, merge to main, and this job mirrors it to the real wiki so
# the two can never quietly drift out of sync again.
#
# One-time setup: create a classic Personal Access Token with the `repo`
# scope (Settings -> Developer settings -> Personal access tokens) and add
# it as a repository secret named WIKI_DEPLOY_TOKEN (Settings -> Secrets
# and variables -> Actions). The default GITHUB_TOKEN cannot push to wikis.

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
  workflow_dispatch: {}

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout wiki repo
        run: |
          git clone "https://x-access-token:${{ secrets.WIKI_DEPLOY_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Mirror wiki/ into the wiki repo
        run: |
          rsync -a --delete --exclude='.git' main-repo/wiki/ wiki-repo/

      - name: Commit and push if changed
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to sync."
            exit 0
          fi
          git commit -m "Sync wiki from main repo commit ${{ github.sha }}"
          git push
